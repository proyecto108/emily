<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una carta</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Georgia,serif;
overflow:hidden;
}

/* ESCENAS */

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
pointer-events:none;
transition:opacity 2s;
}

.scene.active{
opacity:1;
pointer-events:auto;
}

button{
padding:12px 28px;
font-size:18px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:white;
color:black;
}

canvas{
position:absolute;
top:0;
left:0;
transition:transform 6s ease;
}

.zoomSky{
transform:scale(1.4);
}

.title{
font-size:45px;
letter-spacing:3px;
text-align:center;
}

/* contador */

.counterBox{
background:white;
color:red;
padding:40px;
border:4px solid black;
font-size:40px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

/* SOBRE */

.envelope{
width:300px;
height:200px;
background:#eee;
position:relative;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
width:0;
height:0;
border-left:150px solid transparent;
border-right:150px solid transparent;
border-bottom:100px solid #ccc;
top:-100px;
transition:transform 1s;
transform-origin:bottom;
}

.envelope.open:before{
transform:rotateX(180deg);
}

/* CARTA */

.letter{
background:white;
color:black;
padding:50px;
width:70%;
max-width:700px;
line-height:1.8;
font-size:20px;
box-shadow:0 0 40px rgba(0,0,0,.6);
opacity:0;
transform:translateY(40px);
transition:all 2s;
min-height:200px;
}

.letter.show{
opacity:1;
transform:translateY(0);
}

/* estrella fugaz */

.shootingStar{
position:absolute;
top:45%;
left:-200px;
width:4px;
height:4px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white,0 0 20px white;
animation:shoot 3s linear forwards;
}

.shootingStar::after{
content:"";
position:absolute;
width:120px;
height:2px;
background:linear-gradient(90deg,white,transparent);
left:-120px;
top:1px;
}

@keyframes shoot{
to{
transform:translateX(130vw) translateY(-150px);
}
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- escena 1 -->

<div class="scene active" id="s1">
<div class="title">Una carta</div>
<button onclick="next()">Abrir</button>
</div>

<!-- escena 2 -->

<div class="scene" id="s2">
<div class="title">¿Cuándo terminó todo?</div>
<input id="resp" placeholder="Escribe aquí">
<button onclick="check()">Continuar</button>
<p id="err"></p>
</div>

<!-- cielo -->

<div class="scene" id="s3">
<div class="title">Mira el cielo…</div>
</div>

<!-- contador -->

<div class="scene" id="s4">

<div class="counterBox">

<div style="font-size:20px;margin-bottom:10px">
Desde aquel día que todo cambió
</div>

<div style="font-size:16px">
DIAS : HORAS : MINUTOS
</div>

<div id="counter"></div>

</div>

</div>

<!-- carta -->

<div class="scene" id="s5">

<div class="envelope" onclick="openLetter()" id="env"></div>

<div class="letter" id="letter"></div>

</div>

<!-- final -->

<div class="scene" id="s6"></div>

<script>

/* ESCENAS */

let scenes=document.querySelectorAll(".scene")
let i=0

function show(n){

scenes[i].classList.remove("active")
i=n
if(i<0)i=0
if(i>=scenes.length)i=scenes.length-1
scenes[i].classList.add("active")

if(n===2) cinematicSky()

if(n===5) setTimeout(formTeExtrano,2000)

}

function next(){
show(i+1)
}

/* RESPUESTA */

function check(){

let r=document.getElementById("resp").value.toLowerCase().replace(/\s/g,"")

if(r.includes("3marzo")||r.includes("3demarzo")||r.includes("3/3")||r.includes("03/03")){
next()
}else{
document.getElementById("err").innerText="Intenta de nuevo"
}

}

/* CONTADOR */

let start=new Date("March 3 2026 00:00:00")

function update(){

let now=new Date()
let diff=now-start

let d=Math.floor(diff/86400000)
let h=Math.floor(diff/3600000)%24
let m=Math.floor(diff/60000)%60

document.getElementById("counter").innerHTML=
d+" : "+h+" : "+m

}

setInterval(update,60000)
update()

/* SOBRE */

function openLetter(){

document.getElementById("env").classList.add("open")

setTimeout(()=>{
document.getElementById("letter").classList.add("show")
typeLetter()
},1200)

}

/* TEXTO MAQUINA */

let text=`Emily…

No sé en qué momento el silencio empezó a sentirse tan grande.

Desde aquel día hay cosas pequeñas que cambiaron sin que nadie lo note.
Las noches se volvieron más largas,
las canciones suenan distintas,
y tu nombre sigue apareciendo en mi mente cuando menos lo espero.

No escribo esto para cambiar el pasado.

Solo porque hay recuerdos que el corazón no sabe guardar en silencio.

A veces pienso que aunque el mundo siga avanzando…
hay momentos que se quedan suspendidos en algún lugar del cielo.

Y entre todos esos recuerdos
tu nombre sigue brillando.

Mi corazón todavía recuerda tu nombre.`

let pos=0

function typeLetter(){

let el=document.getElementById("letter")

if(pos<text.length){

el.innerHTML+=text.charAt(pos)
pos++

setTimeout(typeLetter,40)

}

}

/* ESTRELLAS */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<450;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
z:Math.random()*2,
s:Math.random()*2
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(st=>{

st.y+=0.02*st.z

if(st.y>canvas.height) st.y=0

ctx.beginPath()
ctx.arc(st.x,st.y,st.s*(0.5+Math.random()),0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

/* FORMAR TEXTO */

function formText(pattern){

stars.forEach((s,i)=>{

let p=pattern[i%pattern.length]

s.x=canvas.width/2 -200 + p[0]*25
s.y=canvas.height/2 -60 + p[1]*25

})

}

/* EMILY */

function formEmily(){

let pattern=[
[0,0],[1,0],[2,0],[0,1],[0,2],[1,2],[2,2],
[4,0],[4,1],[4,2],
[6,0],[6,1],[6,2],[7,1],
[9,0],[9,1],[9,2],
[11,0],[12,1],[13,2]
]

formText(pattern)

}

/* TE EXTRAÑO */

function formTeExtrano(){

let pattern=[
[0,0],[1,0],[2,0],[1,1],[1,2],
[4,0],[4,1],[4,2],
[6,0],[7,0],[8,0],[7,1],[7,2]
]

formText(pattern)

}

/* DISPERSAR */

function disperseStars(){

stars.forEach(s=>{
s.x=Math.random()*canvas.width
s.y=Math.random()*canvas.height
})

}

/* ESTRELLA FUGAZ */

function shootingStar(){

let star=document.createElement("div")
star.className="shootingStar"

document.body.appendChild(star)

setTimeout(()=>{
star.remove()
next()
},3000)

}

/* SECUENCIA CIELO */

function cinematicSky(){

canvas.classList.add("zoomSky")

setTimeout(formEmily,1000)

setTimeout(disperseStars,6000)

setTimeout(shootingStar,7500)

}

</script>

</body>
</html>
