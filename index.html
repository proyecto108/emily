<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un último recuerdo</title><style>

body{
margin:0;
background:black;
color:white;
font-family:Georgia,serif;
overflow:hidden;
}

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:opacity 2s;
pointer-events:none;
}

.scene.active{
opacity:1;
pointer-events:auto;
}

.title{
font-size:42px;
letter-spacing:4px;
text-align:center;
}

button{
margin-top:20px;
padding:12px 28px;
font-size:18px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

canvas{
position:absolute;
top:0;
left:0;
}

.envelope{
width:260px;
height:170px;
background:#eee;
position:absolute;
bottom:120px;
display:none;
opacity:0;
transition:opacity 1.5s;
}

.envelope:before{
content:"";
position:absolute;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-bottom:85px solid #ccc;
top:-85px;
transition:transform 1s;
transform-origin:bottom;
}

.envelope.open:before{
transform:rotateX(180deg);
}

.letter{
background:white;
color:black;
padding:40px;
width:60%;
max-width:600px;
font-size:20px;
line-height:1.6;
display:none;
box-shadow:0 0 40px rgba(0,0,0,.6);
}

</style></head><body><canvas id="stars"></canvas>

<div class="scene active" id="s1">
<div class="title">Un último recuerdo</div>
<button onclick="next()">Abrir</button>
</div><div class="scene" id="s2">
<div class="title">¿Cuándo terminó todo?</div>
<input id="resp">
<button onclick="check()">Continuar</button>
<p id="err"></p>
</div><div class="scene" id="s3">
<div class="title">Mira el cielo...</div>
</div><div class="envelope" id="env"></div><div class="scene" id="s4">
<div class="letter" id="letter">
<p id="text"></p>
<button onclick="closeLetter()">Cerrar carta</button>
</div>
</div><script>

/* ESCENAS */

let current=1

function next(){
document.getElementById("s"+current).classList.remove("active")
current++
document.getElementById("s"+current).classList.add("active")

if(current==3){
setTimeout(formEmily,2000)
}
}

function check(){
let r=document.getElementById("resp").value.toLowerCase()

if(r.includes("febrero")||r.includes("14")){
next()
}else{
document.getElementById("err").innerText="Intenta recordar..."
}
}

/* CANVAS */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]
let meteor=null
let particles=[]

for(let i=0;i<500;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*1.5,
alpha:Math.random(),
tx:null,
ty:null
})

}

/* MOTOR ANIMACION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* estrellas */

for(let s of stars){

if(s.tx){
s.x+=(s.tx-s.x)*0.02
s.y+=(s.ty-s.y)*0.02
}

s.alpha+=(Math.random()-0.5)*0.03

if(s.alpha<0.2)s.alpha=0.2
if(s.alpha>1)s.alpha=1

ctx.beginPath()
ctx.fillStyle="rgba(255,255,255,"+s.alpha+")"
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

}

/* meteorito */

if(meteor){

meteor.x+=meteor.vx
meteor.y+=meteor.vy

particles.push({
x:meteor.x,
y:meteor.y,
life:30
})

ctx.beginPath()
ctx.fillStyle="white"
ctx.arc(meteor.x,meteor.y,4,0,Math.PI*2)
ctx.fill()

}

/* particulas */

for(let i=particles.length-1;i>=0;i--){

let p=particles[i]

p.life--

ctx.beginPath()
ctx.fillStyle="rgba(255,255,255,"+(p.life/30)+")"
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fill()

if(p.life<=0){
particles.splice(i,1)
}

}

requestAnimationFrame(animate)

}

animate()

/* TEXTO ESTRELLAS */

function starText(text,yOffset){

ctx.fillStyle="white"
ctx.font="120px Arial"
ctx.textAlign="center"

ctx.fillText(text,canvas.width/2,canvas.height/2+yOffset)

let img=ctx.getImageData(0,0,canvas.width,canvas.height)

let points=[]

for(let y=0;y<img.height;y+=6){
for(let x=0;x<img.width;x+=6){

let i=(y*img.width+x)*4

if(img.data[i+3]>128){
points.push({x:x,y:y})
}

}
}

for(let i=0;i<points.length && i<stars.length;i++){
stars[i].tx=points[i].x
stars[i].ty=points[i].y
stars[i].size=2
}

}

/* EMILY */

function formEmily(){
starText("EMILY",0)

setTimeout(()=>{
meteor={x:0,y:100,vx:12,vy:4}
},4000)

setTimeout(openEnvelope,7000)

}

/* SOBRE */

function openEnvelope(){

let env=document.getElementById("env")

env.style.display="block"
env.style.left=(canvas.width-260)/2+"px"

setTimeout(()=>{
env.style.opacity="1"
},100)

setTimeout(()=>{
env.classList.add("open")
setTimeout(showLetter,1000)
},1500)

}

/* CARTA */

let message=`Emily...

Tal vez esta carta llega tarde.

Pero las estrellas todavía recuerdan tu nombre.

Hay cosas que el tiempo no puede borrar.

Cuando miro el cielo...

todavía pienso en ti.

Te extraño.`

function showLetter(){

document.getElementById("s3").classList.remove("active")
document.getElementById("s4").classList.add("active")

let letter=document.getElementById("letter")
letter.style.display="block"

typeWriter()

}

let i=0

function typeWriter(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(typeWriter,40)

}

}

function closeLetter(){

document.getElementById("s4").classList.remove("active")

starText("TE EXTRAÑO",80)

}

</script></body>
</html>
