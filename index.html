<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un último recuerdo</title><style>

body{
margin:0;
background:black;
color:white;
font-family:Georgia,serif;
overflow:hidden;
}

canvas{
position:absolute;
top:0;
left:0;
}

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:opacity 2s;
pointer-events:none;
}

.scene.active{
opacity:1;
pointer-events:auto;
}

.title{
font-size:42px;
letter-spacing:4px;
text-align:center;
}

button{
margin-top:20px;
padding:12px 28px;
font-size:18px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

input{
padding:10px;
font-size:16px;
}

.letter{
background:white;
color:black;
padding:40px;
width:70%;
max-width:700px;
font-size:20px;
line-height:1.7;
box-shadow:0 0 40px rgba(0,0,0,.6);
display:none;
}

#contador{
margin-top:20px;
font-size:16px;
opacity:.7;
}

</style></head><body><canvas id="stars"></canvas>

<audio id="shootSound" preload="auto">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5d6f13c6c4.mp3?filename=whoosh-6316.mp3" type="audio/mpeg">
</audio><div class="scene active" id="s1">
<div class="title">Un último recuerdo</div>
<button onclick="next()">Abrir</button>
</div><div class="scene" id="s2">
<div class="title">¿Cuándo terminó todo?</div>
<input id="resp" placeholder="Escribe la fecha">
<button onclick="check()">Continuar</button>
<p id="err"></p>
</div><div class="scene" id="s3">
<div class="title">Mira el cielo...</div>
</div><div class="scene" id="s4">
<div class="letter" id="letter">
<p id="text"></p>
<p id="contador"></p>
<button onclick="closeLetter()">Cerrar</button>
</div>
</div><script>

let current=1

function next(){
document.getElementById("s"+current).classList.remove("active")
current++
document.getElementById("s"+current).classList.add("active")

if(current==3){
setTimeout(formEmily,2000)
}
}

function check(){

let r=document.getElementById("resp").value.toLowerCase()

if(r.includes("3") && r.includes("marzo")){
next()
}else{
document.getElementById("err").innerText="Intenta recordar..."
}

}

/* CANVAS */

const canvas=document.getElementById("stars")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]
let meteor=null
let heartTimer=0

for(let i=0;i<500;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*1.5,
alpha:Math.random(),
tx:null,
ty:null
})

}

/* ANIMACION */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let s of stars){

if(s.tx){
s.x+=(s.tx-s.x)*0.02
s.y+=(s.ty-s.y)*0.02
}

s.alpha+=(Math.random()-0.5)*0.03

if(s.alpha<0.2)s.alpha=0.2
if(s.alpha>1)s.alpha=1

ctx.beginPath()
ctx.fillStyle="rgba(255,255,255,"+s.alpha+")"
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()

}

/* meteorito */

if(meteor){

meteor.x+=meteor.vx
meteor.y+=meteor.vy

ctx.beginPath()
ctx.fillStyle="white"
ctx.arc(meteor.x,meteor.y,4,0,Math.PI*2)
ctx.fill()

}

/* corazón */

if(heartTimer>0){

drawHeart()

heartTimer--

}

requestAnimationFrame(animate)

}

animate()

/* TEXTO ESTRELLAS */

function starText(text){

ctx.fillStyle="white"
ctx.font="120px Arial"
ctx.textAlign="center"

ctx.fillText(text,canvas.width/2,canvas.height/2)

let img=ctx.getImageData(0,0,canvas.width,canvas.height)

let points=[]

for(let y=0;y<img.height;y+=6){
for(let x=0;x<img.width;x+=6){

let i=(y*img.width+x)*4

if(img.data[i+3]>128){
points.push({x:x,y:y})
}

}
}

for(let i=0;i<points.length && i<stars.length;i++){

stars[i].tx=points[i].x
stars[i].ty=points[i].y
stars[i].size=2

}

}

/* EMILY */

function formEmily(){

starText("EMILY")

setTimeout(()=>{

meteor={x:0,y:100,vx:12,vy:4}

document.getElementById("shootSound").play()

},4000)

setTimeout(showLetter,7000)

}

/* CARTA */

let message=`Emily...

Tal vez esta carta llega tarde.

Pero hay recuerdos que el tiempo no consigue borrar.

Desde aquel 3 de marzo
hay lugares que prefiero evitar,
no porque no me gusten,
sino porque cada rincón guarda un momento contigo.

También hay canciones que ya no escucho.

Porque sé que si vuelven a sonar
los recuerdos llegan demasiado fuerte.

A veces miro el cielo por la noche
y me pregunto en qué momento
todo cambió tanto.

No escribo esto esperando algo.

Solo quería que supieras
que hay cosas que siguen viviendo en silencio
dentro de mí.`

function showLetter(){

document.getElementById("s3").classList.remove("active")
document.getElementById("s4").classList.add("active")

let letter=document.getElementById("letter")
letter.style.display="block"

typeWriter()
startCounter()

}

let i=0

function typeWriter(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(typeWriter,35)

}

}

/* CONTADOR */

function startCounter(){

let start=new Date("March 3, 2026")

setInterval(()=>{

let now=new Date()

let diff=now-start

let days=Math.floor(diff/(1000*60*60*24))

document.getElementById("contador").innerText=
"Han pasado "+days+" días desde el 3 de marzo."

},1000)

}

/* CORAZON */

function drawHeart(){

let x=canvas.width/2
let y=canvas.height/2-100

ctx.fillStyle="rgba(255,150,150,0.8)"

for(let t=0;t<Math.PI*2;t+=0.2){

let hx=16*Math.pow(Math.sin(t),3)
let hy=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

ctx.beginPath()
ctx.arc(x+hx*10,y-hy*10,2,0,Math.PI*2)
ctx.fill()

}

}

canvas.addEventListener("click",()=>{

heartTimer=60

})

function closeLetter(){

document.getElementById("s4").classList.remove("active")

}

</script></body>
</html>
