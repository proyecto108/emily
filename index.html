<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emily</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family: "Segoe UI", Arial, sans-serif;
overflow:hidden;
}

/* ESCENAS */

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

/* INTRO BLANCO */

#sceneIntro{
background:white;
color:#111;
}

.introText{
font-size:34px;
max-width:700px;
line-height:1.5;
animation:fadeIn 2s forwards;
opacity:0;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* PREGUNTA */

#sceneQuestion{
background:white;
display:none;
}

.questionBox{
font-size:28px;
max-width:700px;
margin-bottom:20px;
}

input{
padding:12px 16px;
font-size:18px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:12px;
padding:10px 20px;
font-size:18px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

/* TRANSICION NEGRA */

#sceneTransition{
background:black;
color:white;
display:none;
font-size:70px;
letter-spacing:6px;
}

/* CIELO */

#sceneSky{
display:none;
background:linear-gradient(#050510,#0b0b25,#150d35);
color:white;
overflow:hidden;
}

/* ESTRELLAS */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* ESTRELLA FUGAZ */

.shooting{
position:absolute;
width:2px;
height:120px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:shoot 1.1s linear forwards;
}

@keyframes shoot{
0%{transform:translate(-200px,-200px) rotate(45deg);opacity:1;}
100%{transform:translate(900px,900px) rotate(45deg);opacity:0;}
}

/* TEXTO TE EXTRAÑO */

#miss{
position:absolute;
font-size:80px;
color:white;
letter-spacing:10px;
opacity:0;
transition:opacity 1s;
text-shadow:0 0 20px white;
}

/* EMILY */

#emilyStars{
position:absolute;
top:28%;
font-size:60px;
letter-spacing:14px;
opacity:0;
text-shadow:0 0 20px white,0 0 40px #ff8fab;
transition:opacity 2s;
}

/* CONTADOR */

.counterBox{
margin-top:120px;
background:#111;
padding:25px 40px;
border:4px solid black;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.counterTitle{
font-size:22px;
margin-bottom:8px;
}

.counterLabels{
color:#ff2b2b;
font-weight:bold;
margin-bottom:6px;
}

.counter{
font-size:48px;
color:#ff2b2b;
letter-spacing:8px;
}

/* CARTA */

.letter{
margin-top:40px;
max-width:650px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(6px);
padding:30px;
border-radius:12px;
line-height:1.6;
font-size:19px;
min-height:200px;
}

.final{
margin-top:20px;
opacity:.8;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="scene" id="sceneIntro">

<div class="introText" id="intro1">
A veces un solo día puede cambiarlo todo
</div>

</div>

<!-- PREGUNTA -->
<div class="scene" id="sceneQuestion">

<div class="questionBox">
¿Cuándo terminó todo?
</div>

<input id="answer" placeholder="Escribe la fecha">
<button onclick="checkAnswer()">Responder</button>

</div>

<!-- TRANSICION -->
<div class="scene" id="sceneTransition">
<div id="miss">TE EXTRAÑO</div>
</div>

<!-- CIELO -->
<div class="scene" id="sceneSky">

<div id="emilyStars">E M I L Y</div>

<div class="counterBox">

<div class="counterTitle">
Desde aquel día que todo cambió
</div>

<div class="counterLabels">
DIAS : HORAS : MINUTOS
</div>

<div class="counter" id="counter">
00 : 00 : 00
</div>

</div>

<div class="letter" id="letter"></div>

<div class="final" id="final"></div>

</div>

<script>

/* INTRO */

setTimeout(()=>{
document.getElementById("sceneIntro").style.display="none";
document.getElementById("sceneQuestion").style.display="flex";
},3500);

/* RESPUESTA */

function checkAnswer(){

let text=document.getElementById("answer").value
.toLowerCase()
.replace(/\s/g,"");

if(
text==="3demarzo" ||
text==="3marzo" ||
text==="03demarzo"
){

startTransition();

}else{

alert("Ese no fue el día...");

}

}

/* TRANSICION */

function startTransition(){

document.getElementById("sceneQuestion").style.display="none";
document.getElementById("sceneTransition").style.display="flex";

setTimeout(()=>{

shootingStar();

document.getElementById("miss").style.opacity=1;

},600);

setTimeout(()=>{

document.getElementById("sceneTransition").style.display="none";
startSky();

},3200);

}

/* ESTRELLA FUGAZ */

function shootingStar(){

let s=document.createElement("div");
s.className="shooting";
s.style.top="30%";
s.style.left="20%";

document.body.appendChild(s);

setTimeout(()=>{
s.remove();
},1200);

}

/* CIELO */

function startSky(){

document.getElementById("sceneSky").style.display="flex";

createStars();

formEmily();

startCounter();

setTimeout(typeLetter,6000);

}

/* ESTRELLAS */

function createStars(){

for(let i=0;i<150;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

}

/* FORMAR EMILY */

function formEmily(){

let el=document.getElementById("emilyStars");

setTimeout(()=>{
el.style.opacity=1;
},1000);

setTimeout(()=>{

underlineStar();

},2500);

setTimeout(()=>{
el.style.opacity=.2;
},7000);

}

/* SUBRAYAR NOMBRE */

function underlineStar(){

let s=document.createElement("div");

s.className="shooting";

s.style.top="28%";
s.style.left="20%";

document.body.appendChild(s);

setTimeout(()=>{
s.remove();
},1000);

}

/* CONTADOR */

function startCounter(){

function update(){

let start=new Date("March 3, 2026 00:00:00").getTime();

let now=new Date().getTime();

let diff=now-start;

let days=Math.floor(diff/(1000*60*60*24));

let hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));

let minutes=Math.floor((diff%(1000*60*60))/(1000*60));

document.getElementById("counter").innerHTML=
String(days).padStart(2,"0")+" : "+
String(hours).padStart(2,"0")+" : "+
String(minutes).padStart(2,"0");

}

update();

setInterval(update,60000);

}

/* CARTA */

function typeLetter(){

let text=`Emily...

No sé si algún día vas a ver esto.

Pero desde ese día
hay algo que no he podido ignorar.

Hay momentos en los que todo parece normal,
y de repente algo me recuerda a ti.

Una canción.
Un lugar.
Un recuerdo.

Y entonces me doy cuenta
de que todavía estás en muchas partes
de mi vida.

No escribí esto para volver al pasado.

Solo quería decir algo que a veces
se queda atorado en la cabeza:

te extraño.

Y aunque el tiempo siga pasando,
hay cosas que mi corazón
simplemente no olvida.`;

let i=0;

let el=document.getElementById("letter");

let interval=setInterval(()=>{

el.innerHTML+=text[i];

i++;

if(i>=text.length){

clearInterval(interval);

showFinal();

}

},40);

}

/* FINAL */

function showFinal(){

setTimeout(()=>{

document.getElementById("final").innerHTML=
"Hay nombres que el tiempo no borra.<br>El tuyo todavía vive aquí.";

},4000);

}

</script>

</body>
</html>
