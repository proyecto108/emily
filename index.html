<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emily</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
}

/* cielo y estrellas */

#sky{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* intro */

#intro{
position:absolute;
top:40%;
width:100%;
font-size:32px;
opacity:0;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* loader */

#loader{
margin-top:120px;
font-size:20px;
}

/* secciones */

#question,#memory,#skyScene{
display:none;
margin-top:80px;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

/* emily estrellas */

#emilyStars{
font-size:55px;
letter-spacing:15px;
color:#fff;
text-shadow:0 0 10px #fff,0 0 30px #ff8fab;
margin-top:40px;
transition:opacity 4s;
}

/* estrella fugaz */

.shootingStar{
position:fixed;
width:2px;
height:80px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:shoot 1s linear;
}

@keyframes shoot{
0%{transform:translate(-200px,-200px) rotate(45deg);opacity:1;}
100%{transform:translate(800px,800px) rotate(45deg);opacity:0;}
}

/* mensaje te extraño */

#missMessage{
position:fixed;
top:30%;
width:100%;
font-size:40px;
color:white;
text-shadow:0 0 10px white,0 0 30px #ff8fab;
opacity:0;
transition:opacity 0.6s;
pointer-events:none;
}

/* frases */

#phrases{
margin-top:20px;
font-size:18px;
opacity:0.8;
}

/* contador */

#counter{
margin-top:20px;
font-size:18px;
}

/* carta */

#letter{
margin-top:40px;
max-width:650px;
margin-left:auto;
margin-right:auto;
font-size:20px;
line-height:1.6;
min-height:200px;
}

/* final */

#final{
margin-top:40px;
font-size:18px;
opacity:0.8;
}
</style>
</head>

<body>

<div id="sky"></div>

<div id="missMessage">te extraño</div>

<div id="intro">Emily</div>

<div id="loader">
<p>Cargando memoria...</p>
<p>Buscando conversación...</p>
<p>Accediendo a recuerdos...</p>
</div>

<div id="question">
<p>¿Cuál fue el primer mensaje del 2026 que me enviaste?</p>
<input id="answer">
<button onclick="checkAnswer()">Responder</button>
</div>

<div id="memory">
<p>Mensaje encontrado...</p>
<p>Abriendo recuerdo...</p>
</div>

<div id="skyScene">

<div id="emilyStars">E M I L Y</div>

<div id="phrases"></div>

<div id="counter"></div>

<div id="letter"></div>

<div id="final"></div>

</div>

<script>

/* estrellas del cielo */

for(let i=0;i<150;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.getElementById("sky").appendChild(star);
}

/* inicio */

setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("question").style.display="block";
},4000);

/* respuesta flexible */

function checkAnswer(){

let a=document.getElementById("answer").value
.toLowerCase()
.replace(/\s/g,"");

if(a==="teamo"){

document.getElementById("question").style.display="none";
document.getElementById("memory").style.display="block";

setTimeout(()=>{
document.getElementById("memory").style.display="none";
document.getElementById("skyScene").style.display="block";
startExperience();
},3000);

}else{

alert("Ese no fue el recuerdo...");

}

}

/* frases */

let phrases=[
"Aún miro el cielo pensando en ti",
"Hay noches donde tu nombre brilla más que las estrellas",
"Emily...",
"Hay recuerdos que no se apagan"
];

let phraseIndex=0;

function changePhrase(){
document.getElementById("phrases").innerText=phrases[phraseIndex];
phraseIndex=(phraseIndex+1)%phrases.length;
}

setInterval(changePhrase,6000);

/* contador */

function updateCounter(){

let start=new Date("March 3, 2026 00:00:00").getTime();
let now=new Date().getTime();
let diff=now-start;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((diff%(1000*60*60))/(1000*60));

document.getElementById("counter").innerHTML=
"Han pasado<br>"+days+" días<br>"+hours+" horas<br>"+minutes+" minutos<br>desde el 3 de marzo de 2026";

}

setInterval(updateCounter,60000);
updateCounter();

/* carta */

function typeLetter(){

let text=`Emily...

No sé si algún día llegarás a ver esto.

Pero había algo que necesitaba decir,
aunque sea al cielo.

A veces miro nuestras conversaciones
y vuelvo a ese primer mensaje del 2026.

Ese "Te amo" que te envié...

y me pregunto en qué momento
dejamos de ser nosotros.

Tal vez nunca leas esto...

...pero necesitaba decirlo.

Porque aunque el tiempo pase
y todo cambie,

todavía hay una parte de ti
que sigue viviendo aquí,

en mi corazón.`;

let i=0;

let interval=setInterval(()=>{

document.getElementById("letter").innerHTML+=text[i];
i++;

if(i>=text.length){
clearInterval(interval);
showFinal();
fadeEmily();
}

},40);

}

/* final */

function showFinal(){

setTimeout(()=>{

document.getElementById("final").innerHTML=
"A veces todavía reviso nuestro chat...<br><br>solo para volver a ver ese \"Te amo\" que te envié el primer día del 2026.<br><br>Si algún día vuelves a esta página...<br>quiero que sepas que todavía guardo tu lugar en mi corazón.";

},4000);

}

/* Emily se desvanece */

function fadeEmily(){
setTimeout(()=>{
document.getElementById("emilyStars").style.opacity="0.3";
},8000);
}

/* estrella fugaz + mensaje */

let firstStar=true;

function shootingStar(){

let star=document.createElement("div");
star.className="shootingStar";

star.style.top=Math.random()*50+"vh";
star.style.left=Math.random()*50+"vw";

document.body.appendChild(star);

if(firstStar){
firstStar=false;

let msg=document.getElementById("missMessage");

msg.style.opacity="1";

setTimeout(()=>{
msg.style.opacity="0";
},1500);

}

setTimeout(()=>{
star.remove();
},1000);

}

setInterval(shootingStar,8000);

/* iniciar experiencia */

function startExperience(){

changePhrase();

setTimeout(typeLetter,5000);

}

</script>

</body>
</html>
