<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Emily</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Georgia,serif;
color:white;
text-align:center;
background:black;
transition:background 2s;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* TITULO */

h1{
margin-top:40px;
font-size:42px;
letter-spacing:2px;
}

/* CONTADOR */

.contadorBox{

margin-top:20px;

display:inline-block;

border:6px solid black;

padding:30px 60px;

background:rgba(0,0,0,0.6);

}

.contadorTitulo{
color:red;
font-size:22px;
}

.contador{
font-size:70px;
color:#ff2b2b;
letter-spacing:6px;
}

/* CARTA */

.carta{

display:none;

width:60%;

margin:auto;

margin-top:50px;

background:white;

color:black;

padding:60px;

border-radius:10px;

box-shadow:0 25px 80px rgba(0,0,0,0.7);

font-size:22px;

line-height:1.8;

animation:aparecerCarta 2s;

}

@keyframes aparecerCarta{

from{
opacity:0;
transform:translateY(60px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* PREGUNTA */

.pregunta{

display:none;

margin-top:40px;

}

input{
padding:12px;
font-size:18px;
}

button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
}

/* FINAL */

#final{

display:none;

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:100px;

text-shadow:0 0 60px white;

animation:zoomFinal 3s;

}

@keyframes zoomFinal{

from{
opacity:0;
transform:scale(0.4) translate(-50%,-50%);
}

to{
opacity:1;
transform:scale(1) translate(-50%,-50%);
}

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<h1>Emily…</h1>

<p style="font-size:24px;">
mi corazón todavía recuerda tu nombre.
</p>

<div class="contadorBox">

<div class="contadorTitulo">
DIAS : HORAS : MINUTOS
</div>

<div class="contador" id="contador"></div>

</div>

<div class="carta" id="carta">
<p id="textoCarta"></p>
</div>

<div class="pregunta" id="pregunta">

<h2>¿Cuándo terminó todo?</h2>

<input id="respuesta">

<button onclick="verificar()">Enviar</button>

</div>

<div id="final">TE EXTRAÑO</div>

<script>

/* CANVAS */

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* ESTRELLAS CON PROFUNDIDAD */

let estrellas=[]

for(let i=0;i<600;i++){

estrellas.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*2,

speed:Math.random()*0.7,

targetX:null,

targetY:null

})

}

/* ANIMACION */

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

estrellas.forEach(e=>{

if(e.targetX!=null){

e.x+=(e.targetX-e.x)*0.02
e.y+=(e.targetY-e.y)*0.02

}else{

e.y+=e.speed

if(e.y>canvas.height){

e.y=0
e.x=Math.random()*canvas.width

}

}

ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(animar)

}

animar()

/* FORMAR EMILY CON ESTRELLAS */

function formarEmily(){

let textCanvas=document.createElement("canvas")

let tctx=textCanvas.getContext("2d")

textCanvas.width=canvas.width
textCanvas.height=canvas.height

tctx.font="bold 160px Arial"
tctx.fillText("EMILY",canvas.width/2-230,canvas.height/2)

let data=tctx.getImageData(0,0,canvas.width,canvas.height)

let puntos=[]

for(let y=0;y<data.height;y+=6){
for(let x=0;x<data.width;x+=6){

let i=(y*data.width+x)*4

if(data.data[i+3]>128){

puntos.push({x,y})

}

}
}

/* MOVER ESTRELLAS */

estrellas.forEach((e,i)=>{

if(puntos[i]){

e.targetX=puntos[i].x
e.targetY=puntos[i].y

}

})

}

setTimeout(formarEmily,4000)

/* DISPERSAR ESTRELLAS */

function dispersar(){

estrellas.forEach(e=>{

e.targetX=null
e.targetY=null

})

}

setTimeout(dispersar,11000)

/* ESTRELLAS FUGACES */

function estrellaFugaz(){

let x=-200
let y=Math.random()*200

let interval=setInterval(()=>{

ctx.strokeStyle="white"
ctx.lineWidth=3

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+180,y+90)
ctx.stroke()

x+=30
y+=15

if(x>canvas.width){

clearInterval(interval)

}

},20)

}

setInterval(estrellaFugaz,9000)

/* CONTADOR */

let inicio=new Date("March 3 2024 00:00:00").getTime()

setInterval(()=>{

let ahora=new Date().getTime()

let d=ahora-inicio

let dias=Math.floor(d/(1000*60*60*24))
let horas=Math.floor((d%(1000*60*60*24))/(1000*60*60))
let minutos=Math.floor((d%(1000*60*60))/(1000*60))

document.getElementById("contador").innerHTML=
dias+" : "+horas+" : "+minutos

},1000)

/* CARTA */

let texto="A veces intento distraerme… pero siempre termino pensando en ti. No es algo dramático. Solo hay momentos en los que mi corazón vuelve a pronunciar tu nombre. Emily… te extraño."

let i=0

function escribir(){

if(i<texto.length){

document.getElementById("textoCarta").innerHTML+=texto.charAt(i)

i++

setTimeout(escribir,35)

}

}

setTimeout(()=>{

document.body.style.background="linear-gradient(#020111,#191970)"

document.getElementById("carta").style.display="block"

escribir()

},13000)

setTimeout(()=>{

document.getElementById("pregunta").style.display="block"

},20000)

/* RESPUESTA */

function verificar(){

let r=document.getElementById("respuesta").value.toLowerCase()

if(r.includes("3") && r.includes("mar")){

final()

}

}

/* FINAL CINEMATICO */

function final(){

document.body.style.background="black"

let x=-200
let y=100

let interval=setInterval(()=>{

ctx.strokeStyle="white"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+200,y+100)
ctx.stroke()

x+=40
y+=20

if(x>canvas.width){

clearInterval(interval)

document.getElementById("final").style.display="block"

}

},20)

}

</script>

</body>
</html>
