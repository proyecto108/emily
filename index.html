<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Emily</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Georgia,serif;
color:white;
background:black;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ESCENAS */

.escena{

position:absolute;
width:100%;
height:100%;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

opacity:0;

transition:opacity 1.5s;

}

.activa{
opacity:1;
}

/* BOTONES */

.menu{

position:fixed;
bottom:40px;
width:100%;
display:flex;
justify-content:center;
gap:40px;

}

button{

padding:12px 20px;
font-size:18px;
cursor:pointer;

}

/* CONTADOR */

.contadorBox{

border:6px solid black;
padding:30px 70px;
background:rgba(0,0,0,0.7);

}

.contador{

font-size:70px;
color:red;

}

/* CARTA */

.carta{

background:white;
color:black;

padding:60px;

border-radius:10px;

width:60%;

font-size:22px;

line-height:1.8;

box-shadow:0 20px 60px rgba(0,0,0,0.7);

}

/* FINAL */

#final{

font-size:120px;
text-shadow:0 0 80px white;

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- ESCENA 1 -->

<div class="escena activa" id="escena1">

<h1>Emily…</h1>

<p style="font-size:26px;">
mi corazón todavía recuerda tu nombre
</p>

</div>

<!-- ESCENA 2 -->

<div class="escena" id="escena2">

<div class="contadorBox">

<p>DIAS : HORAS : MINUTOS</p>

<div class="contador" id="contador"></div>

</div>

</div>

<!-- ESCENA 3 -->

<div class="escena" id="escena3">

<div class="carta">

<p id="textoCarta"></p>

</div>

</div>

<!-- ESCENA 4 -->

<div class="escena" id="escena4">

<h2>¿Cuándo terminó todo?</h2>

<input id="respuesta">

<button onclick="verificar()">Enviar</button>

</div>

<!-- ESCENA 5 -->

<div class="escena" id="escena5">

<div id="final">TE EXTRAÑO</div>

</div>

<!-- MENU -->

<div class="menu">

<button onclick="anterior()">⬅</button>

<button onclick="siguiente()">➡</button>

</div>

<script>

/* ESCENAS */

let escenaActual=1

function mostrarEscena(n){

document.querySelectorAll(".escena").forEach(e=>{

e.classList.remove("activa")

})

document.getElementById("escena"+n).classList.add("activa")

}

function siguiente(){

if(escenaActual<5){

escenaActual++

mostrarEscena(escenaActual)

}

}

function anterior(){

if(escenaActual>1){

escenaActual--

mostrarEscena(escenaActual)

}

}

/* CONTADOR DESDE 3 MARZO 2026 */

let inicio=new Date("March 3 2026 00:00:00").getTime()

setInterval(()=>{

let ahora=new Date().getTime()

let d=ahora-inicio

let dias=Math.floor(d/(1000*60*60*24))

let horas=Math.floor((d%(1000*60*60*24))/(1000*60*60))

let minutos=Math.floor((d%(1000*60*60))/(1000*60))

document.getElementById("contador").innerHTML=

dias+" : "+horas+" : "+minutos

},1000)

/* CARTA ESCRIBIENDOSE */

let texto="A veces intento distraerme… pero siempre termino pensando en ti. No es algo dramático. Solo hay momentos en los que mi corazón vuelve a pronunciar tu nombre. Emily… te extraño."

let i=0

function escribir(){

if(i<texto.length){

document.getElementById("textoCarta").innerHTML+=texto.charAt(i)

i++

setTimeout(escribir,40)

}

}

setTimeout(escribir,2000)

/* RESPUESTA */

function verificar(){

let r=document.getElementById("respuesta").value.toLowerCase()

if(r.includes("3") && r.includes("mar")){

escenaActual=5

mostrarEscena(5)

}

}

/* ESTRELLAS */

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estrellas=[]

for(let i=0;i<400;i++){

estrellas.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5

})

}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

estrellas.forEach(e=>{

e.y+=e.speed

if(e.y>canvas.height){

e.y=0
e.x=Math.random()*canvas.width

}

ctx.beginPath()
ctx.arc(e.x,e.y,e.size,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(animar)

}

animar()

</script>

</body>
</html>
